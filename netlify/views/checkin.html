<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Check-In</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: black;
      color: white;
      text-align: center;
    }

    #reader {
      width: 80%;
      margin: 20px auto;
    }

    #resultado {
      margin-top: 20px;
      font-size: 22px;
      padding: 20px;
    }

    .ok {
      background: green;
    }

    .error {
      background: red;
    }
  </style>
</head>
<body>

<h1>Escanear Invitación</h1>

<div id="reader"></div>
<div id="resultado"></div>

<script>

const resultado = document.getElementById("resultado");
let html5QrCode;
let escaneoBloqueado = false;

function mostrarResultado(data) {

  if (data.estado === "ok") {
    resultado.className = "ok";
    resultado.innerHTML = `
      ${data.mensaje} <br>
      FAMILIA: ${data.nombre} <br>
      PASES: ${data.usados} / ${data.permitidos}
    `;
  } else {
    resultado.className = "error";
    resultado.innerHTML = `
      ${data.mensaje} <br>
      ${data.nombre ? data.nombre : ""}
    `;
  }

  setTimeout(() => {
    resultado.className = "";
    resultado.innerHTML = "";
  }, 5000);
}

async function validarCodigo(qrText) {

  let codigo;

  try {
    const url = new URL(qrText);
    codigo = url.searchParams.get("codigo");
  } catch {
    codigo = qrText.trim();
  }

  if (!codigo) {
    mostrarResultado({ estado: "error", mensaje: "QR inválido" });
    return;
  }

  const res = await fetch('/.netlify/functions/validar', {
    method: 'POST',
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ codigo })
  });

  const data = await res.json();
  mostrarResultado(data);
}

function iniciarScanner() {

  html5QrCode = new Html5Qrcode("reader");
  const readerElement = document.getElementById("reader");
   const size = readerElement.offsetWidth; //

  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: size },
    async (qrCodeMessage) => {

      if (escaneoBloqueado) return;

      escaneoBloqueado = true;
      await html5QrCode.stop();

      await validarCodigo(qrCodeMessage);

      setTimeout(() => {
        escaneoBloqueado = false;
        iniciarScanner();
      }, 5000);

    }
  );
}

iniciarScanner();

</script>

</body>
</html>
